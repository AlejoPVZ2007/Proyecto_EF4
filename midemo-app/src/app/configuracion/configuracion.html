<app-navbar></app-navbar>

<div class="content">
    <mat-card class="config-card">
        <mat-card-content>
        <h3 class="card-title">Configuración del sistema</h3>
        <p class="card-subtitle">Ajustes generales de SmartCita ERP</p>

        <form (ngSubmit)="guardarConfiguracion()" #configForm="ngForm">

            <div class="form-group">
            <label class="form-label" for="nombre">Nombre del consultorio</label>
            <mat-form-field appearance="outline" class="full-width">
                <input matInput id="nombre" [(ngModel)]="config.nombre" name="nombre" />
            </mat-form-field>
            </div>

            <div class="form-group">
            <label class="form-label" for="ruc">RUC</label>
            <mat-form-field appearance="outline" class="full-width">
                <input matInput id="ruc" [(ngModel)]="config.ruc" name="ruc" />
            </mat-form-field>
            </div>

            <div class="form-group">
            <label class="form-label" for="direccion">Dirección</label>
            <mat-form-field appearance="outline" class="full-width">
                <input matInput id="direccion" [(ngModel)]="config.direccion" name="direccion" />
            </mat-form-field>
            </div>

            <div class="form-group">
            <label class="form-label" for="telefono">Teléfono principal</label>
            <mat-form-field appearance="outline" class="full-width">
                <input matInput id="telefono" [(ngModel)]="config.telefono" name="telefono" />
            </mat-form-field>
            </div>

            <div class="form-group">
            <label class="form-label" for="email">Email de contacto</label>
            <mat-form-field appearance="outline" class="full-width">
                <input matInput id="email" type="email" [(ngModel)]="config.email" name="email" />
            </mat-form-field>
            </div>

            <button mat-raised-button class="btn-save" type="submit">
            Guardar configuración
            </button>
        </form>
        </mat-card-content>
    </mat-card>

    <mat-card class="config-card">
        <mat-card-content>
        <h3 class="card-title">Gestión de roles</h3>
        <p class="card-subtitle">Permisos por rol de usuario</p>

        <div class="role-row" *ngFor="let rol of roles">
            <div class="role-info">
            <span class="role-name">{{ rol.nombre }}</span>
            <span class="role-desc">{{ rol.descripcion }}</span>
            </div>
            <button mat-stroked-button color="primary">Editar permisos</button>
        </div>
        </mat-card-content>
    </mat-card>
</div>
