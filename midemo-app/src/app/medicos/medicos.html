<app-navbar></app-navbar>

<div class="content">
    <div class="page-header">
        <h1>Médicos</h1>
        <button mat-raised-button color="primary">
            <mat-icon>add</mat-icon>
            Nuevo médico
        </button>
    </div>

    <div class="cards-grid">
        <mat-card
            *ngFor="let medico of medicos"
            class="doctor-card">
            <div class="top-line" [ngClass]="medico.color"></div>

            <mat-card-content>
                <div class="doctor-header">
                    <div class="avatar" [ngClass]="medico.color">
                        {{ medico.inicial }}
                    </div>

                    <div>
                        <h3>{{ medico.nombre }}</h3>
                        <span>{{ medico.cmp }}</span>
                    </div>

                    <span class="status">
                        {{ medico.estado }}
                    </span>
                </div>

                <div class="specialty">
                    {{ medico.especialidad }}
                </div>

                <div class="schedule">
                    <mat-icon>schedule</mat-icon>
                    {{ medico.horario }}
                </div>

                <div class="days">
                    <span *ngFor="let dia of medico.dias">
                        {{ dia }}
                    </span>
                </div>

                <hr>

                <div class="footer">
                    <small>
                        {{ medico.citas }} citas atendidas
                    </small>

                    <div>
                        <button mat-button>
                            Editar
                        </button>

                        <button mat-button color="warn">
                            Eliminar
                        </button>
                    </div>
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</div>
